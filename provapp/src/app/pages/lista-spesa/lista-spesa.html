<div>
  <h2>Lista della Spesa</h2>

  @if (authService.hasRole('user_plus')) {
    <div>
      <input [ngModel]="newItem()" (ngModelChange)="newItem.set($event)" placeholder="Nuovo elemento...">
      <button (click)="addItem()">Aggiungi</button>
    </div>
  }

  <ul>
    @for (item of items(); track item.id) {
      <li>
        {{ item.nome }}
        @if (authService.hasRole('user_plus')) {
          <button (click)="deleteItem(item.id)">elimina</button>
        }
      </li>
    }
  </ul>

  @if (items().length === 0) { <p>Nessun elemento in lista.</p> }
  @if (error()) { <p style="color: red">{{ error() }}</p> }
</div>
